name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Xcode ${{ matrix.xcode }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        xcode:
          - "26.0"
          - "26.2"  # default on macos-26
          - "26.3"
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s "/Applications/Xcode_${{ matrix.xcode }}.app"
      - name: swift --version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  linux:
    name: Linux (Swift 6.2)
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v4
      - name: swift --version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  lint:
    name: swift-format lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: swift-format --version
        run: swift format --version
      - name: Lint
        run: swift format lint --strict --recursive --parallel Sources Tests
