name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Xcode 26.4.1)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s "/Applications/Xcode_26.4.1.app"
      - name: swift --version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  linux:
    name: Linux (Swift 6.2)
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v5
      - name: swift --version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  lint:
    name: swift-format lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: swift-format --version
        run: swift format --version
      - name: Lint
        run: swift format lint --strict --recursive --parallel Sources Tests
